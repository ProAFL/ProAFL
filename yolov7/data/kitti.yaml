# COCO 2017 dataset http://cocodataset.org

# train and val data as 1) directory: path/images/, 2) file: path/images.txt, or 3) list: [path1/images/, path2/images/]
# path: .
# train: datasets/KITTI-yolo/train/images
# val: datasets/KITTI-yolo/val/images

origin_train: /data/mml/ProAFL_data/datasets/kitti-yolo/origin/train/images
train: /data/mml/ProAFL_data/datasets/kitti-yolo/train/images
val: /data/mml/ProAFL_data/datasets/kitti-yolo/val/images
test: /data/mml/ProAFL_data/datasets/kitti-yolo/test/images

# number of classes
nc: 8

# Classes
names:
  0: Car # car
  1: Van # van transport vehicle
  2: Truck # large cargo truck
  3: Pedestrian # person walking on the road
  4: Person_sitting # sitting person
  5: Cyclist # person riding a bicycle or other two-wheeled vehicle
  6: Tram # urban tram
  7: Misc # miscellaneous, hard to classify

# names: [ 'Car', 'Van', 'Truck', 'Pedestrian', 'Person_sitting', 
#         'Cyclist', 'Tram', 'Misc']